<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS-agregator</title>
</head>

<body>
  <div id="app">
    <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="modalTitle"></h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"></button>
            <a href="/" class="btn btn-primary"></a>
          </div>
        </div>
      </div>
    </div>
    <main class="main">
      <div class="form-container bg-dark text-light">
        <div class="form-content container d-flex flex-column col-12 gap-3 py-4">
          <div class="page-content d-flex flex-column col-12">
            <h1 class="page-header display-4 fw-normal">RSS агрегатор</h1>
            <p class="page-description h5 fw-normal">
              Начните читать RSS сегодня! Это легко, это красиво.
            </p>
          </div>

          <form id="addFeedForm" class="form w-100 d-flex align-items-start gap-3 needs-validation" action="/"
            novalidate>
            <div class="form-field d-flex flex-column col-6 gap-2">
              <div class="d-flex flex-column gap-1 form-floating w-100">
                <input id="formInput" autofocus type="url" class="form-input form-control w-100 focus-ring" required
                  aria-label="url">
                <label for="formInput" class="form-label fw-medium">Ссылка RSS</label>

                <p class="form-description small text-secondary m-0">Пример: https://lorem-rss.hexlet.app/feed</p>
                <p class="feedback m-0"></p>
              </div>
            </div>
            <button class="form-submit btn btn-primary btn-lg col-2" type="submit">Добавить</button>
          </form>
        </div>
      </div>
      <div class="feed-container py-5">
        <div class="d-flex justify-content-between container">
          <div id="feedPosts" class="col-7 posts">
          </div>
          <div id="feeds" class="col-4 feeds"></div>
        </div>
      </div>
    </main>
    <footer class="footer col-12 d-flex justify-content-center border-top">
      <p class="footer-copyright m-0 p-3">
        created by
        <a class="link-primary" href="https://ru.hexlet.io/">Hexlet</a>
      </p>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
